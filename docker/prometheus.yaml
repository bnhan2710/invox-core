global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'nestjs-app'
    metrics_path: /api/v1/metrics
    static_configs:
      # host.docker.internal is used to refer to the host machine from within a Docker container
      - targets:
          [
            'host.docker.internal:3400',
            'host.docker.internal:3401',
            'host.docker.internal:3402',
            'host.docker.internal:3403',
            'host.docker.internal:3404',
            'host.docker.internal:3405',
            'host.docker.internal:3406',
          ]
